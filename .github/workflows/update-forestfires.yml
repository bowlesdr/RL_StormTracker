name: Update forest fire data

on:
  schedule:
    - cron: '0 */3 * * *' # every 3 hours — fire status reports update roughly daily, no need for weather.json's hourly cadence
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-forestfires:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch forest fire data
        run: python fetch_forestfires.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update forestfires.json'
          file_pattern: forestfires.json
