    // from the raw GeoJSON geometry, no manual coordinate conversion needed.
    alertLayers = active.map(a => L.geoJSON(a.geoJson, {
      style: { color: a.color, weight: 2, opacity: 0.7, fillColor: a.color, fillOpacity: 0.12 }
    }).addTo(map));

    updateAlertBanner(active);
  }

  // Leaflet only knows how to center a LatLng dead in the middle of the
  // viewport — putting HOME at a specific fractional screen position instead
  // means computing a different "center" coordinate ourselves: the point
  // that, when centered normally, places HOME at the desired spot. Unlike
  // Google Maps, Leaflet's pixel<->latlng conversion is available
  // immediately (no need to wait for a projection-ready event).
  function applyZoomPreset(zoom) {
    const mapDiv = document.getElementById('map');
    const homePoint = map.project(HOME, zoom);
    const dx = (HOME_SCREEN_FRACTION.x - 0.5) * mapDiv.clientWidth;
    const dy = (HOME_SCREEN_FRACTION.y - 0.5) * mapDiv.clientHeight;
    const centerPoint = L.point(homePoint.x - dx, homePoint.y - dy);
    map.setView(map.unproject(centerPoint, zoom), zoom);
  }

  // Unlike the other presets, "Ontario" needs to fit the whole province on
  // screen on every device — a fixed zoom level shows very different
  // real-world extents depending on the viewport's pixel dimensions (e.g. a
  // phone in landscape vs. a large desktop monitor), so this fits an actual
  // east-west span instead. Ontario's box is roughly as tall as it is wide,
  // so on a wide desktop monitor Leaflet's normal fitBounds (which
  // considers both width and height) would be height-constrained, leaving
  // huge empty margins on the sides that end up showing most of Canada.
  // Binding on width alone instead means wide screens zoom in until this
  // span fills the screen, cropping north/south rather than overshooting
  // east and west into neighboring provinces.
  //
  // The west/east edges are pinned to specific landmarks (rather than
  // ONTARIO_BOUNDS' rougher min/max) after iterating by eye: the Ontario/
  // Manitoba border, and Salaberry-de-Valleyfield, QC — just across the
  // Ontario border on the St. Lawrence.
  const ONTARIO_WEST_EDGE_LNG = -95.15; // Ontario/Manitoba border
  const ONTARIO_EAST_EDGE_LNG = -74.13; // Salaberry-de-Valleyfield, QC

  function applyOntarioBoundsPreset() {
    // A zero-height box spanning the edge-to-edge span above, at Rock
    // Lake's latitude (vertical centering is anchored on the watch location
    // rather than Ontario's own north-south midpoint). Leaflet's fitBounds
    // always picks the zoom that's more restrictive between width and
    // height; giving it zero height makes the height constraint infinitely
    // loose, so width is guaranteed to be the sole, exact deciding factor
    // for zoom — reusing Leaflet's own tested fit/center math rather than
    // reimplementing it by hand.
    const bounds = L.latLngBounds(
      [HOME.lat, ONTARIO_WEST_EDGE_LNG],
      [HOME.lat, ONTARIO_EAST_EDGE_LNG]
    );
    map.fitBounds(bounds, { padding: [0, 0] });
  }

  function initZoomPresets() {
    document.querySelectorAll('.zoomPresetBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.bounds === 'ontario') {
          applyOntarioBoundsPreset();
        } else {
          applyZoomPreset(parseInt(btn.dataset.zoom, 10));
        }
        document.querySelectorAll('.zoomPresetBtn').forEach(b => b.classList.toggle('active', b === btn));
        document.getElementById('settingsPanel').classList.remove('open');
      });
    });
  }

  // Plays a supplemental YouTube stream/video via the official IFrame Player
  // API, visible in the bottom-right corner (#ytPlayer). The API script loads
  // lazily, on first use, rather than up front.
  let ytPlayer = null;
  let ytApiLoading = false;
  let pendingYtVideoId = null;

  function extractYouTubeId(url) {
    try {
      const u = new URL(url.trim());
      if (u.hostname === 'youtu.be') return u.pathname.slice(1) || null;
      if (u.pathname.startsWith('/live/')) return u.pathname.split('/')[2] || null;
      if (u.pathname.startsWith('/embed/')) return u.pathname.split('/')[2] || null;
      return u.searchParams.get('v');
    } catch (e) {
      return null;
    }
  }

  function setYtStatus(text) {
    document.getElementById('ytStatus').textContent = text;
  }

  function playYouTubeAudio(videoId) {
    if (!window.YT || !window.YT.Player) {
      pendingYtVideoId = videoId;
      if (!ytApiLoading) {
        ytApiLoading = true;
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);
      }
      return;
    }
    if (!ytPlayer) {
      ytPlayer = new YT.Player('ytPlayerInner', {
        height: '100%', width: '100%',
        videoId,
        playerVars: { autoplay: 1, controls: 1 },
        events: {
          onReady: () => setYtStatus('Playing'),
          onError: () => setYtStatus('Could not play that video')
        }
      });
    } else {
      ytPlayer.loadVideoById(videoId);
      setYtStatus('Playing');
    }
  }

  // Called by the YouTube IFrame API script once it's finished loading.
  window.onYouTubeIframeAPIReady = function () {
    if (pendingYtVideoId) {
      const id = pendingYtVideoId;
      pendingYtVideoId = null;
      playYouTubeAudio(id);
    }
  };

  function initYouTubeAudio() {
    document.getElementById('ytPlayBtn').addEventListener('click', () => {
      const id = extractYouTubeId(document.getElementById('ytUrlInput').value);
      if (!id) {
        setYtStatus('Could not read a video ID from that URL');
        return;
      }
      setYtStatus('Loading…');
      document.getElementById('ytPlayer').style.display = 'block';
      playYouTubeAudio(id);
    });

    document.getElementById('ytStopBtn').addEventListener('click', () => {
      if (ytPlayer && ytPlayer.stopVideo) {
        ytPlayer.stopVideo();
        setYtStatus('Stopped');
      }
      document.getElementById('ytPlayer').style.display = 'none';
    });
  }

  function initControls() {
    // Tornado track, wind station comparison, and the surveyed property
    // boundary are all specific to the Rock Lake area — not meaningful (and
    // in the tornado track's and property boundary's case, not even
    // physically nearby) when the app is pointed at a different location
    // via ?coords=.
    if (!isDefaultLocation) {
      document.getElementById('tornadoOption').style.display = 'none';
      document.getElementById('windOption').style.display = 'none';
      document.getElementById('propertyBoundaryOption').style.display = 'none';
    }

    const toggleIds = { satellite: 'satelliteToggle', stormIntensity: 'stormIntensityToggle' };
    for (const [key, elId] of Object.entries(toggleIds)) {
      const el = document.getElementById(elId);
      setInterval(() => refreshOverlay(key), OVERLAYS[key].refreshMs);

      if (key === 'stormIntensity') {
        // The two overlays occupy the same screen space and would otherwise
        // fight for attention, so showing one suspends the other rather than
        // layering them.
        el.addEventListener('change', () => {
          setOverlayVisible(key, el.checked);
          if (el.checked) pauseRadarForStormIntensity(); else resumeRadarFromStormIntensity();
        });
      } else {
        el.addEventListener('change', () => setOverlayVisible(key, el.checked));
      }
    }

    document.getElementById('windToggle').addEventListener('change', (e) => toggleWindLayer(e.target.checked));
    document.getElementById('tornadoToggle').addEventListener('change', (e) => toggleTornadoTrack(e.target.checked));

    const propertyBoundaryToggleEl = document.getElementById('propertyBoundaryToggle');
    propertyBoundaryToggleEl.addEventListener('change', (e) => togglePropertyBoundary(e.target.checked));
    togglePropertyBoundary(isDefaultLocation && propertyBoundaryToggleEl.checked); // on by default at Rock Lake only

    document.getElementById('boundariesToggle').addEventListener('change', (e) => toggleBoundariesLayer(e.target.checked));

    initRadarScrubbing();
    initYouTubeAudio();
    initZoomPresets();
    initSettingsPanel();

    setInterval(sweepExpiredStrikes, SWEEP_INTERVAL_MS);
    setInterval(updateThunderCircles, THUNDER_ANIMATION_MS);
  }

  // The map always fills the whole screen now — everything except the
  // permanent radar playback bar lives behind this one settings button.
  function initSettingsPanel() {
    const btn = document.getElementById('settingsBtn');
    const panel = document.getElementById('settingsPanel');
    const closeBtn = document.getElementById('settingsCloseBtn');

    btn.addEventListener('click', () => panel.classList.toggle('open'));
    closeBtn.addEventListener('click', () => panel.classList.remove('open'));

    document.addEventListener('click', (e) => {
      if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn) {
        panel.classList.remove('open');
      }
    });

    // A cache-busting query string forces a real network fetch of index.html,
    // since the browser's HTTP cache is keyed on the exact URL and this one
    // has never been requested before — bypassing max-age entirely rather
    // than relying on a normal reload, which can still be served from cache.
    // Existing params (e.g. ?coords=) are preserved so reloading doesn't
    // silently drop back to the Rock Lake default.
    document.getElementById('forceReloadBtn').addEventListener('click', () => {
      const params = new URLSearchParams(window.location.search);
      params.set('r', Date.now());
      location.href = location.pathname + '?' + params.toString();
    });

    document.querySelectorAll('.strikeViewBtn').forEach(btn => {
      btn.addEventListener('click', () => setStrikeViewMode(btn.dataset.mode));
    });
  }

  function initMap() {
    for (const key of Object.keys(OVERLAYS)) {
      overlayState[key] = { visible: false, layer: null, bucket: null };
    }

    map = L.map('map', {
      center: HOME,
      zoom: 7,
      zoomControl: false, // was top-left, same corner as the weather widget
      attributionControl: true,
      // Without this, Leaflet rounds every zoom to the nearest whole
      // number (its default zoomSnap: 1) — fine for scroll/pinch zoom, but
      // it meant the Ontario preset's fitBounds couldn't land its fractional
      // ideal zoom exactly, so the fitted edges (ONTARIO_WEST_EDGE_LNG /
      // ONTARIO_EAST_EDGE_LNG) wouldn't line up precisely with the screen.
      zoomSnap: 0
    });

    // Satellite imagery (Esri World Imagery — free, keyless) plus a thin
    // place-labels overlay, matching the original Google "hybrid" look.
    // Esri's tiles top out at zoom 19 in most areas, same ceiling as before.
    // Labels get their own pane, stacked above the base imagery (z-index
    // 200) but below all our own weather overlays in the default
    // overlayPane (z-index 400) — otherwise labels would render on top of
    // the radar/alerts/tornado/etc. layers instead of underneath them.
    map.createPane('labelsPane');
    map.getPane('labelsPane').style.zIndex = 250;
    map.getPane('labelsPane').style.pointerEvents = 'none';

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri',
      maxZoom: 19
    }).addTo(map);
    boundariesLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
      attribution: '',
      maxZoom: 19,
      pane: 'labelsPane'
    });
    toggleBoundariesLayer(document.getElementById('boundariesToggle').checked);

    // 'moveend' fires once after the viewport settles from *any* change — the
    // initial load, a pan, or a zoom — so it's the single trigger covering
    // all three "we need a full radar refresh" cases in one place.
    map.on('moveend', () => {
      refreshRadarDataAndPlay();
    });

    initControls();
    connectBlitzortung();
    initGeolocation();
    refreshAlerts();
    setInterval(refreshAlerts, ALERT_REFRESH_MS);
    refreshWeather();
    setInterval(refreshWeather, WEATHER_REFRESH_MS);

    // Positions the initial view (HOME at the preset screen fraction)
    // immediately, since Leaflet's pixel math is ready right away — no need
    // to wait for an async projection-ready event the way Google Maps
    // required. This also fires the first 'moveend' above.
    applyZoomPreset(11); // "Local" — tightly focused on the watch location
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  initMap();
</script>
</body>
</html>
