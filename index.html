<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Rock Lake Weather</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#10131a">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body {
    height: 100%; height: 100dvh; margin: 0; overflow: hidden; overscroll-behavior: none;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #10131a; color: #e8ebf0;
  }
  #mapWrap { position: fixed; inset: 0; }
  #map { width: 100%; height: 100%; background: #10131a; }
  .leaflet-control-attribution { font-size: 10px; }

  .control {
    display: flex; align-items: center; gap: 6px; font-size: 13px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .control input[type=number] {
    width: 70px; background: #0e1117; color: #e8ebf0; border: 1px solid #2a3040;
    border-radius: 4px; padding: 6px; font-size: 16px; /* 16px avoids iOS auto-zoom-on-focus */
  }
  .control input[type=checkbox] { width: 18px; height: 18px; }

  /* Permanent radar playback bar — always visible regardless of the settings
     panel, except while a full radar data refresh is in progress (see
     #radarRefreshOverlay below), during which it's hidden entirely. */
  #radarBar {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 20;
    display: flex; align-items: center; gap: 10px;
    background: rgba(23, 27, 36, 0.9); border: 1px solid #3a4256; border-radius: 8px;
    padding: 8px 14px; -webkit-tap-highlight-color: transparent;
  }
  #radarBar.hidden { display: none; }

  /* Shown prominently center-screen whenever the radar data needs a full
     refresh (first load, or the tile grid changing on pan/zoom) — the exact
     total tile count is known upfront for these, so this is a real 0-100%
     measure rather than an approximation. */
  #radarRefreshOverlay {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 40;
    background: rgba(23, 27, 36, 0.95); border: 1px solid #3a4256; border-radius: 10px;
    padding: 20px 28px; width: min(80vw, 360px); text-align: center;
  }
  #radarRefreshOverlay.hidden { display: none; }
  #radarRefreshLabel { font-size: 14px; margin-bottom: 12px; }
  #radarRefreshTrack { height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden; }
  #radarRefreshBar { height: 100%; width: 0%; background: #ffb454; transition: width 0.15s linear; }
  #radarRefreshPercent { margin-top: 8px; font-size: 13px; opacity: 0.8; }

  #radarAgeSlider { width: 90px; accent-color: #ffb454; opacity: 1; }
  #radarAgeSlider.forecast { accent-color: #4dd0ff; }
  #radarNextUpdateLabel { opacity: 0.7; min-width: 60px; font-size: 13px; }
  #radarFrameLabel { opacity: 0.7; min-width: 60px; font-size: 13px; }
  #radarFrameLabel.live {
    opacity: 1; color: #4dff88; font-weight: 700; letter-spacing: 0.04em;
    animation: liveBlink 1.4s ease-in-out infinite;
  }
  @keyframes liveBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Active severe weather alerts covering HOME — deliberately the most
     prominent thing on screen, since these are the most actionable of
     everything this app shows. */
  #alertBanner {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 32;
    width: calc(100% - 32px); max-width: 480px;
  }
  #alertBanner.hidden { display: none; }
  #alertBanner details {
    background: rgba(30, 20, 10, 0.95); border: 1px solid #6b4e1f; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 6px; font-size: 13px;
  }
  #alertBanner summary { cursor: pointer; font-weight: 700; }
  #alertBanner .alertText {
    margin-top: 8px; white-space: pre-line; font-size: 12px; line-height: 1.5;
    opacity: 0.9; max-height: 200px; overflow-y: auto;
  }

  /* Environment Canada forecast for Rock Lake, pulled from a weather.json
     committed hourly by a GitHub Actions workflow (see fetch_weather.py) —
     EC's API doesn't reliably send CORS headers, so a static page can't call
     it directly from the browser. */
  #weatherWidget {
    position: fixed; top: 12px; left: 12px; z-index: 20;
    background: rgba(23, 27, 36, 0.9); border: 1px solid #3a4256; border-radius: 8px;
    font-size: 13px;
  }
  #weatherWidget.hidden { display: none; }

  /* Collapsed: a small icon-only button, same footprint as #settingsBtn on
     the opposite corner — the point of this state is to give mobile a way
     to get the widget out of the way entirely, since the expanded card
     (especially with the hourly table) can be wider than a phone screen. */
  #weatherWidget.collapsed { width: 40px; height: 40px; }
  #weatherCollapsedBtn {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    background: none; border: none; color: #e8ebf0; font-size: 18px; cursor: pointer; padding: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }

  /* Expanded: the full card. No explicit width — a fixed-position box with
     only `left` set shrink-wraps to its content by default, so this grows
     to fit the hourly table on a roomy desktop screen without any extra
     rule needed. max-width caps that at the viewport on narrow (mobile)
     screens instead; overflow-x:auto on the widget itself (rather than just
     the hourly table) means that if the table still doesn't fit, the whole
     card scrolls as one unit rather than the header and table scrolling
     independently. The collapse control lives at the far left of that
     scrollable content (see #weatherCollapseHint below) specifically so
     it's still reachable at the default, unscrolled position — anchoring
     it to the right instead would put it out of reach until the user
     scrolled all the way over. */
  #weatherWidget.expanded {
    padding: 10px 14px; max-width: calc(100vw - 24px); overflow-x: auto;
  }
  #weatherNow {
    display: flex; align-items: baseline; gap: 8px; cursor: pointer; width: max-content;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  #weatherCollapseHint { font-size: 11px; opacity: 0.5; }
  #weatherTemp { font-size: 22px; font-weight: 700; }
  #weatherCondition { opacity: 0.85; }
  #weatherHiLo { font-size: 12px; opacity: 0.7; margin-top: 2px; width: max-content; }
  #weatherDaily { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; width: max-content; }
  .weatherDailyRow { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; opacity: 0.85; }
  #weatherHourly {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #3a4256; width: max-content;
  }
  #weatherHourlyTable { border-collapse: collapse; font-size: 12px; }
  #weatherHourlyTable th {
    text-align: left; font-weight: 400; opacity: 0.6; padding: 2px 10px 2px 0; white-space: nowrap;
  }
  #weatherHourlyTable td { text-align: center; padding: 2px 8px; white-space: nowrap; }
  #weatherHourlyTable .weatherHourlyIcon { font-size: 16px; }
  #weatherUpdated { margin-top: 8px; font-size: 11px; opacity: 0.5; }

  /* Single button that opens the "everything else" settings panel */
  #settingsBtn {
    position: fixed; top: 12px; right: 12px; z-index: 20;
    background: rgba(23, 27, 36, 0.85); color: #e8ebf0; border: 1px solid #3a4256;
    border-radius: 6px; width: 40px; height: 40px; font-size: 18px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }

  #settingsPanel {
    display: none; position: fixed; top: 12px; right: 12px; z-index: 25;
    width: 220px; background: #171b24; border: 1px solid #3a4256; border-radius: 8px;
    padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    flex-direction: column; gap: 6px;
    max-height: calc(100dvh - 24px); overflow-y: auto;
  }
  #settingsPanel.open { display: flex; }
  #settingsPanel h2 { font-size: 13px; margin: 0 24px 0 0; }
  #settingsCloseBtn {
    position: absolute; top: 10px; right: 10px; background: none; border: none;
    color: #e8ebf0; font-size: 15px; cursor: pointer; padding: 4px;
  }
  #forceReloadBtn {
    background: #2a3040; color: #e8ebf0; border: 1px solid #3a4256; border-radius: 4px;
    padding: 8px; font-size: 13px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  #settingsPanel .control { justify-content: space-between; }

  /* Bottom-right corner. Offset above the radar bar so the two don't overlap.
     #ytPlayer (this wrapper) controls the actual on-screen size; the YouTube
     API replaces the #ytPlayerInner div inside it with an iframe carrying its
     own inline width/height:100%, so sizing must live on an ancestor rather
     than on the element YouTube takes over — otherwise its inline style wins. */
  #ytPlayer {
    display: none;
    position: fixed; right: 0; bottom: 80px; width: 12.5vw; height: 25vh; z-index: 15;
    background: #000; border: 1px solid #3a4256;
  }
  #ytPlayerInner { width: 100%; height: 100%; display: block; }
  #ytControls { display: flex; flex-direction: column; gap: 12px; }
  .sectionLabel { font-size: 12px; opacity: 0.6; margin-top: 10px; }
  .streamLinks { display: flex; flex-direction: column; gap: 6px; }
  .streamLinks a {
    color: #4dd0ff; text-decoration: none; font-size: 13px; text-align: center;
    background: #182028; border: 1px solid #2a3040; border-radius: 4px; padding: 6px 10px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .streamLinks a:hover { background: #223040; border-color: #3a4256; }
  #ytUrlInput {
    width: 100%; box-sizing: border-box; background: #0e1117; color: #e8ebf0;
    border: 1px solid #2a3040; border-radius: 4px; padding: 6px; font-size: 13px;
  }
  .buttonRow { display: flex; gap: 6px; }
  .zoomButtonGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .buttonRow button, .zoomButtonGrid button {
    flex: 1; background: #2a3040; color: #e8ebf0; border: 1px solid #3a4256; border-radius: 4px;
    padding: 8px; font-size: 13px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .buttonRow button.active, .zoomButtonGrid button.active {
    background: #ffb454; color: #10131a; border-color: #ffb454; font-weight: 700;
  }
  #ytStatus { font-size: 12px; opacity: 0.7; }

  @media (max-width: 640px) {
    #radarBar {
      left: 0; right: 0; transform: none; border-radius: 0;
      border-left: none; border-right: none;
      padding: 6px 10px; gap: 6px;
    }
    #radarAgeSlider { flex: 1; width: auto; min-width: 0; }
    #settingsPanel { width: calc(100% - 24px); right: 12px; }
    #ytPlayer, #ytControls { display: none !important; }
  }
</style>
</head>
<body>
<div id="mapWrap"><div id="map"></div></div>

<div id="alertBanner" class="hidden"></div>

<div id="weatherWidget" class="hidden"></div>

<div id="radarBar">
  <span id="radarNextUpdateLabel"></span>
  <input type="range" id="radarAgeSlider" min="0" max="180" step="6" value="0">
  <span id="radarFrameLabel"></span>
</div>

<div id="radarRefreshOverlay" class="hidden">
  <div id="radarRefreshLabel">Loading radar data&hellip;</div>
  <div id="radarRefreshTrack"><div id="radarRefreshBar"></div></div>
  <div id="radarRefreshPercent">0%</div>
</div>

<button id="settingsBtn" type="button" title="Settings">&#9881;</button>

<div id="settingsPanel">
  <button id="settingsCloseBtn" type="button" aria-label="Close">&#10005;</button>
  <h2>Rock Lake Weather</h2>
  <label class="control" title="Satellite imagery (visible light by day, infrared by night) showing actual cloud cover from space — useful for seeing storm systems and broader cloud patterns that radar, which only detects precipitation, doesn't capture.">
    <input type="checkbox" id="satelliteToggle"> Clouds
  </label>
  <label class="control" title="Raw radar reflectivity (dBZ), not converted to a rain rate like the main radar forecast. Both come from the same 1-hour motion-extrapolated nowcast, but this skips the rain-rate conversion. Very high values (roughly 55+ dBZ) signal an unusually intense cell — often hail — even when the rain forecast alongside it just looks like heavy rain, since that conversion assumes what's being detected is rain.">
    <input type="checkbox" id="stormIntensityToggle"> Storm Intensity (next 1h)
  </label>
  <label class="control" id="tornadoOption" title="Documented tornado track: Christie Lake to Jasper, ON — July 24, 2024. Click the line on the map for details.">
    <input type="checkbox" id="tornadoToggle"> Tornado(s)
  </label>
  <label class="control" id="propertyBoundaryOption" title="Rock Lake property boundary, surveyed corners.">
    <input type="checkbox" id="propertyBoundaryToggle" checked> Property Boundary
  </label>
  <label class="control" title="Municipal/administrative boundary lines and place labels (Esri).">
    <input type="checkbox" id="boundariesToggle" checked> Municipal Boundaries
  </label>

  <label class="control" id="windOption" title="Live wind from every nearby station within 50km — both ECCC's official network and Weather Underground's crowd-sourced personal weather stations, which are much denser near Rock Lake but uncalibrated compared to ECCC's.">
    <input type="checkbox" id="windToggle"> Wind
  </label>

  <div class="sectionLabel">Lightning</div>
  <div class="buttonRow">
    <button type="button" class="strikeViewBtn active" data-mode="recent">Show Recent</button>
    <button type="button" class="strikeViewBtn" data-mode="all">Show All</button>
  </div>

  <div class="sectionLabel">Zoom Level</div>
  <div class="zoomButtonGrid">
    <button type="button" class="zoomPresetBtn" data-zoom="14">Neighborhood</button>
    <button type="button" class="zoomPresetBtn" data-zoom="11">Local</button>
    <button type="button" class="zoomPresetBtn" data-zoom="8">Regional</button>
    <button type="button" class="zoomPresetBtn" data-bounds="ontario">Ontario</button>
  </div>

  <div id="ytControls">
    <div class="sectionLabel">Find current analysis stream</div>
    <div class="streamLinks">
      <a href="https://www.youtube.com/@InstantWeather/streams" target="_blank" rel="noopener">InstantWeather</a>
      <a href="https://www.youtube.com/@CanadianWeatherLive/streams" target="_blank" rel="noopener">Canadian Weather Live</a>
    </div>
    <input type="text" id="ytUrlInput" placeholder="Paste YouTube URL">
    <div class="buttonRow">
      <button id="ytPlayBtn" type="button">&#9654; Play</button>
      <button id="ytStopBtn" type="button">&#9632; Stop</button>
    </div>
    <span id="ytStatus"></span>
  </div>

  <button id="forceReloadBtn" type="button">&#8635; Reload latest version</button>
</div>
<div id="ytPlayer"><div id="ytPlayerInner"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ---- Watch location — defaults to Rock Lake, overridable via a
  // ?coords=lat,lng URL param (e.g. &coords=44.4736,-77.7579) so the same
  // app can be pointed at a different spot without a code change.
  const HOME = { lat: 44.80996960818295, lng: -76.25362035830996 };
  let HOME_NAME = 'Rock Lake';
  let isDefaultLocation = true;
  (function applyCoordsOverride() {
    const coordsParam = new URLSearchParams(window.location.search).get('coords');
    if (!coordsParam) return;
    const parts = coordsParam.split(',').map(s => parseFloat(s.trim()));
    if (parts.length !== 2 || parts.some(Number.isNaN)) return;
    const [lat, lng] = parts;
    if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return;
    HOME.lat = lat;
    HOME.lng = lng;
    HOME_NAME = 'Watch Location';
    isDefaultLocation = false;
  })();
  const DEVICE_DISTANCE_MIN_KM = 1; // don't bother showing a device distance when it's basically at HOME already

  // Where HOME should sit on screen for every preset view: vertically
  // centered, two-thirds of the way to the right edge (leaving more room to
  // the west, where Ontario extends from this near-the-eastern-border spot).
  const HOME_SCREEN_FRACTION = { x: 2 / 3, y: 0.5 };

  // Rough bounding box for all of Ontario — used only to decide what counts
  // toward the session-wide "Show All Lightning" history, independent of
  // whatever the current map viewport happens to be.
  const ONTARIO_BOUNDS = { minLat: 41.5, maxLat: 57, minLng: -95.5, maxLng: -74 };
  function isWithinOntario(lat, lng) {
    return lat >= ONTARIO_BOUNDS.minLat && lat <= ONTARIO_BOUNDS.maxLat &&
      lng >= ONTARIO_BOUNDS.minLng && lng <= ONTARIO_BOUNDS.maxLng;
  }

  // ---- Tunables ----
  const STRIKE_TTL_MS = 5 * 60 * 1000;    // how long a strike stays on the map / list, fading to nothing
  const SWEEP_INTERVAL_MS = 2000;         // how often expired strikes are pruned / faded
  const NEAR_ALERT_KM = 8;                // "very close" marker color threshold

  // Thunder "sound wave" ring — expands outward from each strike at the
  // speed of sound (343 m/s at sea level / room temperature) and stops
  // growing once it reaches the distance beyond which thunder is
  // essentially never audible (commonly cited as ~20km, even in ideal
  // still, quiet conditions — turbulence/wind/terrain usually cut this
  // shorter in practice).
  const SOUND_SPEED_KM_PER_MS = 343 / 1e6;
  const THUNDER_MAX_AUDIBLE_KM = 20;
  const THUNDER_ANIMATION_MS = 200;
  const BLITZORTUNG_SERVERS = ['ws1', 'ws3', 'ws7', 'ws8'];
  const RECONNECT_DELAY_MS = 3000;
  const MERCATOR_RADIUS = 6378137;
  const MERCATOR_ORIGIN_SHIFT = Math.PI * MERCATOR_RADIUS;

  // Tiles are always requested/rendered at this many device pixels per CSS
  // tile pixel, so overlay imagery matches the screen's actual pixel density
  // instead of being upscaled from a fixed 256x256 buffer (which is what made
  // radar/satellite tiles look blocky on high-DPI phones). Capped at 2 to
  // keep tile requests/processing reasonable on 3x+ displays.
  const TILE_DPR = Math.min(window.devicePixelRatio || 1, 2);
  const TILE_PX = 256 * TILE_DPR;

  // Finished (fetched + noise-filtered + blurred) radar tile canvases, keyed
  // by frame time + tile coord, so scrubbing back to an already-seen frame is
  // an instant synchronous redraw instead of redoing the fetch and per-pixel
  // processing. Only historical (time-stamped) frames are cached — the live
  // frame's bucket changes each refresh, so caching it would be pointless.
  // Capped and evicted oldest-first (Map preserves insertion order) to keep
  // memory bounded over a long session.
  const RADAR_TILE_CACHE_MAX = 800;
  const radarTileCache = new Map();

  function cacheRadarTile(key, canvas) {
    const copy = document.createElement('canvas');
    copy.width = canvas.width;
    copy.height = canvas.height;
    copy.getContext('2d').drawImage(canvas, 0, 0);
    radarTileCache.delete(key);
    radarTileCache.set(key, copy);
    if (radarTileCache.size > RADAR_TILE_CACHE_MAX) {
      radarTileCache.delete(radarTileCache.keys().next().value);
    }
  }

  // Toggle-able MSC GeoMet WMS overlays. refreshMs should roughly match each
  // product's own update cadence, since the server always serves its latest
  // data and we cache-bust the tile URLs to pick that up.
  const OVERLAYS = {
    radar: { layer: 'RADAR_1KM_RRAI', style: 'Radar-Rain_Dis-8colors', opacity: 0.65, refreshMs: 6 * 60 * 1000 },
    satellite: { layer: 'GOES-East_1km_DayVis-NightIR', style: '', opacity: 0.55, refreshMs: 10 * 60 * 1000 },
    // Raw dBZ reflectivity, the closest public substitute for "storm
    // intensity" — ECCC doesn't expose VIL or echo tops. This specific layer
    // is a 1-hour-forward nowcast (extrapolated from current motion), not a
    // historical composite, so unlike the rain radar it's just a simple
    // current/latest toggle rather than a scrubbable timeline.
    stormIntensity: { layer: 'Radar_1km_dBZ-Extrapolation', style: 'Radar-dBZ_Dis-8colors', opacity: 0.6, refreshMs: 6 * 60 * 1000 }
  };

  // The discrete 8-color radar style's lightest band (0.1-1.0 mm/h "trace"
  // precipitation) is what shows up as scattered, meaningless-looking blotches
  // that don't represent real rain. We filter it out client-side by matching
  // its exact flat RGB (sampled from GeoMet's own legend) since the WMS
  // service has no server-side intensity threshold parameter.
  const RADAR_HIDE_COLOR = { r: 152, g: 254, b: 152 };
  const RADAR_HIDE_TOLERANCE = 20;

  function isRadarNoisePixel(r, g, b) {
    return Math.abs(r - RADAR_HIDE_COLOR.r) <= RADAR_HIDE_TOLERANCE &&
      Math.abs(g - RADAR_HIDE_COLOR.g) <= RADAR_HIDE_TOLERANCE &&
      Math.abs(b - RADAR_HIDE_COLOR.b) <= RADAR_HIDE_TOLERANCE;
  }

  let map, userLocationMarker;
  let userPosition = null;
  const overlayState = {}; // key -> { visible, layer, bucket }
  const activeStrikes = []; // { marker, timestampMs }

  // Every strike seen since the page loaded, anywhere in Ontario, regardless
  // of the current viewport and never expired — the data backing "Show All".
  // Markers for these are only created on demand (see setStrikeViewMode),
  // not as each strike arrives.
  const allSessionStrikes = []; // { lat, lng, timestampMs, distanceKm }
  let allStrikeMarkers = [];
  let showingAllStrikes = false;

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // Blitzortung streams each strike LZW-compressed, one code point per symbol.
  // This is a direct port of the decompressor their own clients use.
  function lzwDecode(input) {
    const dict = {};
    let currChar = input[0];
    let oldPhrase = currChar;
    const out = [currChar];
    let code = 256;
    for (let i = 1; i < input.length; i++) {
      const currCode = input.charCodeAt(i);
      let phrase;
      if (currCode < 256) {
        phrase = input[i];
      } else {
        phrase = dict[currCode] ? dict[currCode] : (oldPhrase + currChar);
      }
      out.push(phrase);
      currChar = phrase.charAt(0);
      dict[code] = oldPhrase + currChar;
      code++;
      oldPhrase = phrase;
    }
    return out.join('');
  }

  function ageOpacity(ageMs) {
    return Math.max(0, 1 - ageMs / STRIKE_TTL_MS);
  }

  // Converts a tile coordinate to its EPSG:3857 bounding box, so the WMS
  // radar image lines up exactly with the map's own tiles. Pure Web Mercator
  // math — identical regardless of which mapping library is drawing tiles.
  function tileToMercatorBBox(x, y, zoom) {
    const tileSize = 256;
    const resolution = (2 * Math.PI * MERCATOR_RADIUS / tileSize) / Math.pow(2, zoom);
    const minX = x * tileSize * resolution - MERCATOR_ORIGIN_SHIFT;
    const maxX = (x + 1) * tileSize * resolution - MERCATOR_ORIGIN_SHIFT;
    const maxY = MERCATOR_ORIGIN_SHIFT - y * tileSize * resolution;
    const minY = MERCATOR_ORIGIN_SHIFT - (y + 1) * tileSize * resolution;
    return [minX, minY, maxX, maxY];
  }

  // Historical (time-stamped) frames never change once generated, so their
  // URLs are left stable to let the browser's own HTTP cache (GeoMet sends
  // Cache-Control: max-age=360) serve repeat loop passes without refetching.
  // The "live" overlay has no time param, so it needs a cache-busting bucket
  // to actually pick up new data on each periodic refresh.
  function wmsTileUrl(def, bucket, time, coord, zoom) {
    const tileCount = Math.pow(2, zoom);
    let x = coord.x % tileCount;
    if (x < 0) x += tileCount;
    if (coord.y < 0 || coord.y >= tileCount) return null;

    const bbox = tileToMercatorBBox(x, coord.y, zoom).join(',');
    const params = new URLSearchParams({
      service: 'WMS', version: '1.3.0', request: 'GetMap',
      layers: def.layer, styles: def.style, format: 'image/png', transparent: 'true',
      width: String(TILE_PX), height: String(TILE_PX), crs: 'EPSG:3857', bbox
    });
    if (time) params.set('time', time);
    else if (bucket) params.set('_bucket', bucket);
    return `https://geo.weather.gc.ca/geomet?${params.toString()}`;
  }

  // Applies the noise-filter + blur pipeline to a loaded tile image and
  // draws the result onto ctx (whether that's a tile actually on-screen, or
  // an offscreen canvas used purely for background prefetching). Shared by
  // both the live createTile path and the refreshRadarDataAndPlay prefetch
  // loop so the two don't drift.
  function processRadarTileImage(ctx, img, cacheKey) {
    ctx.drawImage(img, 0, 0, TILE_PX, TILE_PX);
    try {
      const imageData = ctx.getImageData(0, 0, TILE_PX, TILE_PX);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        if (data[i + 3] > 0 && isRadarNoisePixel(data[i], data[i + 1], data[i + 2])) {
          data[i + 3] = 0;
        }
      }
      ctx.putImageData(imageData, 0, 0);

      // Softens the hard edges of the source data's native grid cells (that's
      // the actual "pixelated" look — the composite really is coarse-
      // resolution, not just upscaled) by blurring a snapshot back onto the
      // tile. Alpha-aware, so it doesn't smear color into the transparent
      // background.
      const snapshot = document.createElement('canvas');
      snapshot.width = TILE_PX;
      snapshot.height = TILE_PX;
      snapshot.getContext('2d').drawImage(ctx.canvas, 0, 0);
      ctx.clearRect(0, 0, TILE_PX, TILE_PX);
      ctx.filter = `blur(${TILE_DPR}px)`;
      ctx.drawImage(snapshot, 0, 0);
      ctx.filter = 'none';
    } catch (e) { /* pixel access failed; leave tile unfiltered */ }
    if (cacheKey) cacheRadarTile(cacheKey, ctx.canvas);
  }

  // Renders radar tiles onto a canvas so the noise-band pixels can be made
  // transparent client-side (see isRadarNoisePixel above) — a custom
  // L.GridLayer, since Leaflet's stock TileLayer.WMS just requests plain
  // image tiles and can't post-process pixels either. Purely a renderer —
  // draws whatever's cached, or fetches+processes+caches what isn't. Loading
  // *progress* is tracked separately by refreshRadarDataAndPlay, which
  // fetches everything up front before this ever needs to run for real (so
  // in normal use this is almost always a cache hit).
  const RadarGridLayer = L.GridLayer.extend({
    initialize(time, isForecast, options) {
      L.GridLayer.prototype.initialize.call(this, options);
      this._time = time;
      this._isForecast = isForecast;
      this._bucket = time ? null : Date.now();
    },
    createTile(coord, done) {
      const def = this._isForecast ? RADAR_FORECAST_LAYER : OVERLAYS.radar;
      const canvas = document.createElement('canvas');
      canvas.width = TILE_PX;
      canvas.height = TILE_PX;
      canvas.style.width = '256px';
      canvas.style.height = '256px';
      canvas.style.opacity = def.opacity;
      const ctx = canvas.getContext('2d');
      const time = this._time;

      const cacheKey = time ? `${time}|${coord.x}|${coord.y}|${coord.z}` : null;
      const cached = cacheKey && radarTileCache.get(cacheKey);
      if (cached) {
        ctx.drawImage(cached, 0, 0);
        setTimeout(() => done(null, canvas), 0);
        return canvas;
      }

      const url = wmsTileUrl(def, this._bucket, time, coord, coord.z);
      if (url) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { processRadarTileImage(ctx, img, cacheKey); done(null, canvas); };
        img.onerror = () => done(null, canvas);
        img.src = url;
      } else {
        done(null, canvas);
      }
      return canvas;
    }
  });

  function createRadarLayer(time, isForecast) {
    return new RadarGridLayer(time, isForecast, { tileSize: 256, opacity: 1 });
  }

  // Every tile coordinate visible in the current viewport at a given zoom —
  // used both for prefetching and for the exact-tile-count progress bar.
  // Leaflet's own map.project() does the Web Mercator pixel math for us.
  function getVisibleTileCoords(zoom) {
    const bounds = map.getBounds();
    if (!bounds) return [];
    const nw = map.project(bounds.getNorthWest(), zoom).divideBy(256).floor();
    const se = map.project(bounds.getSouthEast(), zoom).divideBy(256).floor();
    const coords = [];
    for (let x = nw.x; x <= se.x; x++) {
      for (let y = nw.y; y <= se.y; y++) {
        coords.push({ x, y });
      }
    }
    return coords;
  }

  function prefetchRadarTile(time, coord, zoom, isForecast) {
    return new Promise(resolve => {
      const cacheKey = `${time}|${coord.x}|${coord.y}|${zoom}`;
      if (radarTileCache.has(cacheKey)) { resolve(); return; }
      const def = isForecast ? RADAR_FORECAST_LAYER : OVERLAYS.radar;
      const url = wmsTileUrl(def, null, time, coord, zoom);
      if (!url) { resolve(); return; }
      const img = new Image();
      img.crossOrigin = 'anonymous';
      const offscreen = document.createElement('canvas');
      offscreen.width = TILE_PX;
      offscreen.height = TILE_PX;
      img.onload = () => { processRadarTileImage(offscreen.getContext('2d'), img, cacheKey); resolve(); };
      img.onerror = resolve;
      img.src = url;
    });
  }

  // Simple pass-through WMS overlays (Clouds, Storm Intensity) — Leaflet's
  // built-in WMS tile layer handles bbox/tile-URL construction itself, and
  // setParams() lets the periodic cache-busting refresh update in place
  // rather than needing to remove/recreate the whole layer.
  function createOverlayLayer(key) {
    const def = OVERLAYS[key];
    const bucket = Date.now();
    overlayState[key].bucket = bucket;
    return L.tileLayer.wms('https://geo.weather.gc.ca/geomet', {
      layers: def.layer,
      styles: def.style,
      format: 'image/png',
      transparent: true,
      version: '1.3.0',
      opacity: def.opacity,
      uppercase: true,
      _bucket: bucket
    });
  }

  function setOverlayVisible(key, visible) {
    const state = overlayState[key];
    state.visible = visible;
    if (state.layer) {
      map.removeLayer(state.layer);
      state.layer = null;
    }
    if (visible) {
      state.layer = createOverlayLayer(key);
      state.layer.addTo(map);
    }
  }

  function refreshOverlay(key) {
    if (!overlayState[key].visible) return;
    // Update params in place (new cache-busting bucket) instead of
    // removing/recreating the layer, avoiding a visible flash.
    const bucket = Date.now();
    overlayState[key].bucket = bucket;
    overlayState[key].layer.setParams({ _bucket: bucket });
  }

  // Radar playback: animates 2 hours of past/current composites plus a
  // 1-hour forecast nowcast (extrapolated from current motion — ECCC's
  // public WMS doesn't expose anything further out or a true model
  // forecast). Frames at index > RADAR_NOW_INDEX come from a different WMS
  // layer (RADAR_FORECAST_LAYER) than the historical ones (OVERLAYS.radar).
  const RADAR_PLAYBACK_STEP_MS = 6 * 60 * 1000;
  const RADAR_PLAYBACK_FRAMES = 21; // 20 steps of 6 min = 2 hours of history, ending at "now"
  const RADAR_FORECAST_FRAMES = 10; // 10 more steps of 6 min = 1 hour forecast
  const RADAR_NOW_INDEX = RADAR_PLAYBACK_FRAMES - 1;
  const RADAR_FORECAST_LAYER = { layer: 'Radar_1km_RainPrecipRate-Extrapolation', style: 'Radar-Rain_Dis-8colors', opacity: 0.45 };
  const RADAR_PLAYBACK_FRAME_MS = 700; // 1000ms stock speed, 30% faster
  const RADAR_CYCLE_BLANK_MS = 3000; // map goes blank for this long between the end of a full cycle and the next one starting
  const RADAR_WINDOW_CHECK_MS = 60 * 1000;
  let radarPlaying = false;
  let radarFrameTimes = [];
  let radarFrameIndex = 0;
  let radarPlayTimerId = null;
  let radarWindowTimerId = null;
  let radarNextUpdateTimerId = null;
  let radarLatestObservedAt = 0; // wall-clock time we last saw a new newest frame, not the server's own timestamp

  // Ticks continuously regardless of which frame is currently displayed or
  // scrubbed to (unlike the old behavior, where this only showed up while
  // viewing the live frame) — always reflects real time remaining until the
  // next actual radar update, reading radarLatestObservedAt fresh each tick
  // rather than capturing it once, so it stays correct across window
  // refreshes without needing to be restarted.
  function startNextUpdateCountdown() {
    clearInterval(radarNextUpdateTimerId);
    const el = document.getElementById('radarNextUpdateLabel');
    const tick = () => {
      el.innerHTML = `Next Data<br>${formatCountdown((radarLatestObservedAt + RADAR_PLAYBACK_STEP_MS) - Date.now())}`;
    };
    tick();
    radarNextUpdateTimerId = setInterval(tick, 1000);
  }

  function showRadarRefreshOverlay() {
    document.getElementById('radarBar').classList.add('hidden');
    document.getElementById('radarRefreshOverlay').classList.remove('hidden');
    updateRadarRefreshProgress(0, 0);
  }

  function hideRadarRefreshOverlay() {
    document.getElementById('radarRefreshOverlay').classList.add('hidden');
    document.getElementById('radarBar').classList.remove('hidden');
  }

  function updateRadarRefreshProgress(completed, total) {
    const pct = total > 0 ? Math.min(100, Math.round((completed / total) * 100)) : 0;
    document.getElementById('radarRefreshBar').style.width = `${pct}%`;
    document.getElementById('radarRefreshPercent').textContent = `${pct}%`;
  }

  function formatCountdown(ms) {
    const totalSeconds = Math.max(0, Math.round(ms / 1000));
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${minutes}:${String(seconds).padStart(2, '0')}`;
  }

  async function fetchLatestRadarTime() {
    const resp = await fetch('https://geo.weather.gc.ca/geomet?service=WMS&version=1.3.0&request=GetCapabilities&layers=' + OVERLAYS.radar.layer);
    const text = await resp.text();
    const match = text.match(/<Dimension[^>]*name="time"[^>]*default="([^"]+)"/);
    return match ? new Date(match[1]) : new Date(Math.floor(Date.now() / RADAR_PLAYBACK_STEP_MS) * RADAR_PLAYBACK_STEP_MS);
  }

  // The forecast layer's own "latest" (its current run's base time) doesn't
  // line up with the observed radar layer's — they're separate products on
  // independent publish schedules, verified to differ by as much as a full
  // 6-minute step. Its time dimension requires an exact match (no
  // nearest-value snapping), so forecast frames must be built relative to
  // this, not to fetchLatestRadarTime's value.
  // Captures the layer's full valid time extent (start/end), not just its
  // default — needed to clamp forecast frame generation to what's actually
  // valid, since this layer requires an exact time match with no
  // nearest-value snapping and its ~1hr window has a hard upper bound.
  async function fetchForecastTimeExtent() {
    try {
      const resp = await fetch('https://geo.weather.gc.ca/geomet?service=WMS&version=1.3.0&request=GetCapabilities&layers=' + RADAR_FORECAST_LAYER.layer);
      const text = await resp.text();
      const match = text.match(/<Dimension[^>]*name="time"[^>]*>([^<]+)<\/Dimension>/);
      if (!match) return null;
      const [start, end] = match[1].split('/');
      return { base: new Date(start), upper: new Date(end) };
    } catch (e) {
      return null;
    }
  }

  // forecastExtent.base is the forecast layer's own valid time grid origin —
  // may be offset from `latest` by up to one step, so forecast frames are
  // built relative to it, filtered to strictly after `latest` and clamped to
  // forecastExtent.upper, keeping the timeline monotonic without duplicating
  // history or exceeding what the layer actually has data for.
  function buildRadarWindow(latest, forecastExtent) {
    const frames = [];
    for (let i = RADAR_PLAYBACK_FRAMES - 1; i >= 0; i--) {
      frames.push(new Date(latest.getTime() - i * RADAR_PLAYBACK_STEP_MS).toISOString().replace(/\.\d+Z$/, 'Z'));
    }
    if (forecastExtent) {
      const { base, upper } = forecastExtent;
      for (let i = 0, count = 0; count < RADAR_FORECAST_FRAMES; i++) {
        const t = new Date(base.getTime() + i * RADAR_PLAYBACK_STEP_MS);
        if (t.getTime() <= latest.getTime()) continue;
        if (t.getTime() > upper.getTime()) break; // don't request past the layer's own valid range
        frames.push(t.toISOString().replace(/\.\d+Z$/, 'Z'));
        count++;
      }
    }
    return frames;
  }

  // Keeps playback a true rolling "last hour" as real time passes, rather
  // than looping the same fixed hour forever. Rebuilds the whole window from
  // the server's authoritative latest time (rather than incrementally
  // shifting) so it self-corrects even after a long gap, e.g. the tab being
  // backgrounded and its timers throttled for a while.
  async function refreshRadarWindow() {
    if (!radarPlaying) return;
    const [latest, forecastExtent] = await Promise.all([fetchLatestRadarTime(), fetchForecastTimeExtent()]);
    const newFrames = buildRadarWindow(latest, forecastExtent);
    if (newFrames[RADAR_NOW_INDEX] === radarFrameTimes[RADAR_NOW_INDEX]) return; // "now" hasn't advanced yet

    radarLatestObservedAt = Date.now();
    const currentTime = radarFrameTimes[radarFrameIndex];
    radarFrameTimes = newFrames;
    const preservedIndex = radarFrameTimes.indexOf(currentTime);
    radarFrameIndex = preservedIndex !== -1 ? preservedIndex : RADAR_NOW_INDEX;

    // Quietly warm the newest historical frame plus the whole forecast
    // portion in the background — this routine rolling-window update isn't
    // one of the events (first load, pan/zoom) that warrants the
    // full-screen refresh treatment. The forecast frames all need
    // re-warming every time (not just the newest one), since they're a
    // rolling nowcast that regenerates entirely each time "now" advances,
    // rather than stable history with one new frame appended.
    const zoom = Math.round(map.getZoom());
    const coords = getVisibleTileCoords(zoom);
    for (let idx = RADAR_NOW_INDEX; idx < radarFrameTimes.length; idx++) {
      const time = radarFrameTimes[idx];
      const isForecast = idx > RADAR_NOW_INDEX;
      coords.forEach(coord => prefetchRadarTile(time, coord, zoom, isForecast));
    }
  }

  function removeRadarLayer() {
    if (overlayState.radar.layer) {
      map.removeLayer(overlayState.radar.layer);
      overlayState.radar.layer = null;
    }
  }

  // Updates the slider position and age/countdown label for whichever frame
  // is now showing, regardless of how it got swapped in.
  function updateRadarUI(index) {
    const stepMinutes = RADAR_PLAYBACK_STEP_MS / 60000;
    const offsetMinutes = (index - RADAR_NOW_INDEX) * stepMinutes; // negative = past, 0 = now, positive = forecast
    const isForecastFrame = index > RADAR_NOW_INDEX;
    const elapsedMinutes = index * stepMinutes; // rises left-to-right so "now" lands partway across, forecast after it
    const slider = document.getElementById('radarAgeSlider');
    slider.max = (radarFrameTimes.length - 1) * stepMinutes;
    slider.value = elapsedMinutes;
    slider.classList.toggle('forecast', isForecastFrame);

    const label = document.getElementById('radarFrameLabel');
    label.classList.toggle('live', offsetMinutes === 0);
    const frameTime = new Date(radarFrameTimes[index]);
    const clockText = frameTime.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    let relText;
    if (offsetMinutes === 0) relText = 'now';
    else if (offsetMinutes < 0) relText = `${-offsetMinutes} min ago`;
    else relText = `${offsetMinutes} min from now`;
    label.innerHTML = `${clockText}<br>${relText}`;
  }

  // Swaps the overlay immediately rather than waiting for tiles to preload —
  // used for both automatic playback and slider dragging. An earlier version
  // blocked each automatic-playback frame swap on a full network preload of
  // every visible tile first; if any single WMS tile was slow to respond
  // (common under load on a public weather server), the whole animation
  // would stall waiting for it. Individual tiles now simply pop in as they
  // load — repeat views of a frame are instant anyway via radarTileCache.
  const RADAR_OVERLAY_SWAP_DELAY_MS = 150;

  function scrubToFrame(index) {
    const time = radarFrameTimes[index];
    const isForecast = index > RADAR_NOW_INDEX;
    const state = overlayState.radar;
    const previousLayer = state.layer;

    state.layer = createRadarLayer(time, isForecast);
    state.layer.addTo(map);
    if (previousLayer) {
      // Give the new overlay's tiles a brief head start before removing the
      // old one, so the map doesn't flash blank while cache-miss tiles are
      // still loading. Short enough not to reintroduce a perceptible delay.
      setTimeout(() => {
        if (map.hasLayer(previousLayer)) map.removeLayer(previousLayer);
      }, RADAR_OVERLAY_SWAP_DELAY_MS);
    }

    updateRadarUI(index);
  }

  // The one entry point for "we need radar data now": first page load, and
  // every pan/zoom (via the map's 'moveend' listener in initMap). Unlike the
  // background warm-up used for the routine rolling-window update, this
  // knows the *exact* total tile count up front (frames × currently-visible
  // tiles), so it can show real 0-100% progress — and while it runs, all the
  // now-stale frame UI (slider, label, map overlay) is hidden rather than
  // left showing data for the wrong viewport.
  let radarRefreshId = 0;

  async function refreshRadarDataAndPlay() {
    const refreshId = ++radarRefreshId;

    clearTimeout(radarPlayTimerId);
    clearInterval(radarWindowTimerId);
    radarPlaying = false;
    removeRadarLayer();

    showRadarRefreshOverlay();

    const [latest, forecastExtent] = await Promise.all([fetchLatestRadarTime(), fetchForecastTimeExtent()]);
    if (refreshId !== radarRefreshId) return; // superseded by a newer pan/zoom
    radarFrameTimes = buildRadarWindow(latest, forecastExtent);
    radarLatestObservedAt = Date.now();

    const zoom = Math.round(map.getZoom());
    const coords = getVisibleTileCoords(zoom);
    const total = radarFrameTimes.length * coords.length;
    let completed = 0;
    updateRadarRefreshProgress(0, total);

    await Promise.all(radarFrameTimes.map((time, idx) => Promise.all(coords.map(coord =>
      prefetchRadarTile(time, coord, zoom, idx > RADAR_NOW_INDEX).then(() => {
        if (refreshId !== radarRefreshId) return;
        completed++;
        updateRadarRefreshProgress(completed, total);
      })
    ))));
    if (refreshId !== radarRefreshId) return; // superseded partway through

    hideRadarRefreshOverlay();
    beginRadarPlayback();
  }

  function beginRadarPlayback() {
    removeRadarLayer();
    radarPlaying = true;
    radarFrameIndex = 0;
    overlayState.radar.visible = true;
    scrubToFrame(radarFrameIndex);

    radarWindowTimerId = setInterval(refreshRadarWindow, RADAR_WINDOW_CHECK_MS);
    scheduleNextRadarFrame();
    startNextUpdateCountdown();
  }

  // Suspends the radar animation and hides its bar while Storm Intensity is
  // on, rather than showing both radar-derived overlays at once. The
  // rolling-window background refresh (radarWindowTimerId) deliberately
  // keeps running so the data is current whenever playback resumes.
  function pauseRadarForStormIntensity() {
    if (!radarPlaying) return;
    clearTimeout(radarPlayTimerId);
    removeRadarLayer();
    document.getElementById('radarBar').classList.add('hidden');
  }

  function resumeRadarFromStormIntensity() {
    if (!radarPlaying) return;
    document.getElementById('radarBar').classList.remove('hidden');
    scrubToFrame(radarFrameIndex);
    scheduleNextRadarFrame();
  }

  // Blanks the map rather than leaving the last-shown frame's overlay up —
  // used only at the end of a full cycle (see scheduleNextRadarFrame), as a
  // clear "resetting" cue before the next pass starts from the beginning.
  function clearRadarDisplay() {
    removeRadarLayer();
    const label = document.getElementById('radarFrameLabel');
    label.textContent = '';
    label.classList.remove('live');
  }

  // Advances straight through past → now → forecast every
  // RADAR_PLAYBACK_FRAME_MS with no pause in the middle (there's nothing
  // special about "now" pacing-wise now that forecast frames continue past
  // it) — only once the very last (furthest-forecast) frame has been shown
  // does it blank the map for RADAR_CYCLE_BLANK_MS before looping back to
  // frame 0, so each full pass reads as a distinct cycle.
  function scheduleNextRadarFrame() {
    radarPlayTimerId = setTimeout(() => {
      if (radarFrameIndex >= radarFrameTimes.length - 1) {
        clearRadarDisplay();
        radarPlayTimerId = setTimeout(() => {
          radarFrameIndex = 0;
          scrubToFrame(radarFrameIndex);
          scheduleNextRadarFrame();
        }, RADAR_CYCLE_BLANK_MS);
      } else {
        radarFrameIndex++;
        scrubToFrame(radarFrameIndex);
        scheduleNextRadarFrame();
      }
    }, RADAR_PLAYBACK_FRAME_MS);
  }

  // Lets the user drag the slider to scrub through frames directly, pausing
  // auto-advance for the duration of the drag and resuming it from wherever
  // they let go.
  function initRadarScrubbing() {
    const slider = document.getElementById('radarAgeSlider');
    const stepMinutes = RADAR_PLAYBACK_STEP_MS / 60000;

    slider.addEventListener('input', () => {
      if (!radarPlaying || radarFrameTimes.length === 0) return;
      clearTimeout(radarPlayTimerId);
      const index = Math.round(parseFloat(slider.value) / stepMinutes);
      radarFrameIndex = Math.min(Math.max(index, 0), radarFrameTimes.length - 1);
      scrubToFrame(radarFrameIndex);
    });

    slider.addEventListener('change', () => {
      if (!radarPlaying) return;
      scheduleNextRadarFrame();
    });
  }

  function addStrike(lat, lng, timestampMs, distanceKm) {
    const lines = [`${distanceKm.toFixed(0)} km from ${HOME_NAME}`];
    if (userPosition && haversineKm(HOME.lat, HOME.lng, userPosition.lat, userPosition.lng) > DEVICE_DISTANCE_MIN_KM) {
      const deviceDistanceKm = haversineKm(userPosition.lat, userPosition.lng, lat, lng);
      lines.push(`${deviceDistanceKm.toFixed(0)} km from device`);
    }

    const marker = L.circleMarker([lat, lng], {
      radius: 1.95,
      color: '#ffffff',
      weight: 1,
      fillColor: distanceKm <= NEAR_ALERT_KM ? '#ff4d4d' : '#ffb454',
      fillOpacity: 0.9
    }).addTo(map);

    // Thunder sound-wave ring, starting at radius 0 and grown each tick by
    // updateThunderCircles() below — a real (if simplified) physical
    // simulation of how far the sound from this specific strike has
    // traveled since it happened, not just a decorative animation.
    const soundCircle = L.circle([lat, lng], {
      radius: 0,
      color: '#ffffff',
      weight: 1,
      fill: false,
      opacity: 0.5,
      interactive: false
    }).addTo(map);

    // Elapsed time is computed fresh on each click rather than baked into
    // the static `lines` array above, since that's built once when the
    // strike arrives and would otherwise show a stale age by the time it's
    // actually tapped. Explicit dark text color, since the popup otherwise
    // inherits the page's light body color (#e8ebf0) — that's what made it
    // barely readable.
    marker.bindTooltip(lines.join('<br>')); // hover on desktop
    marker.bindPopup(() => // tap on mobile — Leaflet opens a marker's bound popup on click automatically
      `<div style="color:#1a1a1a;font:13px -apple-system,Segoe UI,Roboto,Arial,sans-serif;">` +
      `${formatElapsedSince(timestampMs)} ago<br>${lines.join('<br>')}</div>`
    );

    activeStrikes.push({ marker, soundCircle, timestampMs });
  }

  // Grows each active strike's thunder ring at the speed of sound, capped
  // at THUNDER_MAX_AUDIBLE_KM — beyond that distance thunder wouldn't
  // realistically be heard, so once the ring reaches the cap it's removed
  // outright rather than left sitting at max radius. Runs on its own fast
  // interval rather than piggybacking on the slower SWEEP_INTERVAL_MS
  // strike-expiry sweep, since ~58 seconds to reach the cap needs smoother
  // steps than that to read as an expanding wave rather than a jump-cut.
  function updateThunderCircles() {
    const now = Date.now();
    for (const s of activeStrikes) {
      if (!s.soundCircle) continue; // already reached the cap and been removed
      const radiusKm = (now - s.timestampMs) * SOUND_SPEED_KM_PER_MS;
      if (radiusKm >= THUNDER_MAX_AUDIBLE_KM) {
        map.removeLayer(s.soundCircle);
        s.soundCircle = null;
      } else {
        s.soundCircle.setRadius(radiusKm * 1000);
      }
    }
  }

  function formatElapsedSince(timestampMs) {
    const totalSeconds = Math.max(0, Math.floor((Date.now() - timestampMs) / 1000));
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${minutes}:${String(seconds).padStart(2, '0')}`;
  }

  // Small, permanent (non-fading) marker style for allSessionStrikes entries
  // — visually distinct from the live view's near-real-time markers so the
  // two aren't confused.
  function createAllStrikeMarker(s) {
    return L.circleMarker([s.lat, s.lng], {
      radius: 0.975,
      color: '#ffffff',
      weight: 0.5,
      fillColor: '#4dd0ff',
      fillOpacity: 0.5
    }).bindTooltip(`${s.distanceKm.toFixed(0)} km from ${HOME_NAME}, ${new Date(s.timestampMs).toLocaleTimeString()}`);
  }

  // Shows/hides every recorded strike from allSessionStrikes depending on
  // which of the two mutually-exclusive "Show Recent"/"Show All" buttons is
  // selected. While "all" is active, newly-arriving strikes get a marker
  // added immediately too (see ws.onmessage) rather than this being a
  // one-time snapshot.
  function setStrikeViewMode(mode) {
    const wantAll = mode === 'all';
    if (wantAll === showingAllStrikes) return; // already in the requested mode
    showingAllStrikes = wantAll;
    if (showingAllStrikes) {
      allStrikeMarkers = allSessionStrikes.map(s => createAllStrikeMarker(s).addTo(map));
    } else {
      allStrikeMarkers.forEach(m => map.removeLayer(m));
      allStrikeMarkers = [];
    }
    document.querySelectorAll('.strikeViewBtn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
  }

  function sweepExpiredStrikes() {
    const now = Date.now();
    for (let i = activeStrikes.length - 1; i >= 0; i--) {
      const s = activeStrikes[i];
      const age = now - s.timestampMs;
      if (age > STRIKE_TTL_MS) {
        map.removeLayer(s.marker);
        if (s.soundCircle) map.removeLayer(s.soundCircle);
        activeStrikes.splice(i, 1);
      } else {
        s.marker.setStyle({ fillOpacity: ageOpacity(age) * 0.9, opacity: ageOpacity(age) });
        if (s.soundCircle) s.soundCircle.setStyle({ opacity: ageOpacity(age) * 0.5 });
      }
    }
  }

  function connectBlitzortung() {
    const server = BLITZORTUNG_SERVERS[Math.floor(Math.random() * BLITZORTUNG_SERVERS.length)];
    const ws = new WebSocket(`wss://${server}.blitzortung.org:443/`);

    ws.onopen = () => {
      ws.send(JSON.stringify({ a: 111 }));
    };

    ws.onmessage = (event) => {
      let strike;
      try {
        strike = JSON.parse(lzwDecode(event.data));
      } catch (e) {
        return; // malformed / partial frame, skip
      }
      if (typeof strike.lat !== 'number' || typeof strike.lon !== 'number') return;

      const distanceKm = haversineKm(HOME.lat, HOME.lng, strike.lat, strike.lon);
      const timestampMs = strike.time ? Math.floor(strike.time / 1e6) : Date.now();

      // Tracked for "Show All Lightning" regardless of the current viewport
      // or the live view's 5-minute fade-out — this is the full session
      // history, kept separately from the transient on-screen markers below.
      if (isWithinOntario(strike.lat, strike.lon)) {
        const record = { lat: strike.lat, lng: strike.lon, timestampMs, distanceKm };
        allSessionStrikes.push(record);
        if (showingAllStrikes) allStrikeMarkers.push(createAllStrikeMarker(record).addTo(map));
      }

      // The live, fading view is still shown/filtered by whatever's
      // currently on-screen — panning/zooming the map controls which recent
      // strikes appear there.
      const bounds = map.getBounds();
      if (!bounds || !bounds.contains([strike.lat, strike.lon])) return;
      addStrike(strike.lat, strike.lon, timestampMs, distanceKm);
    };

    ws.onerror = () => ws.close();

    ws.onclose = () => {
      setTimeout(connectBlitzortung, RECONNECT_DELAY_MS);
    };
  }

  // Shows where the phone/browser viewing the page currently is, distinct from
  // the fixed HOME watch location. Silently does nothing if geolocation is
  // unsupported or denied — the map is fully usable without it.
  function initGeolocation() {
    if (!('geolocation' in navigator)) return;

    navigator.geolocation.watchPosition(
      (pos) => {
        const position = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        userPosition = position;
        if (!userLocationMarker) {
          userLocationMarker = L.circleMarker(position, {
            radius: 6,
            color: '#ffffff',
            weight: 2,
            fillColor: '#4285f4',
            fillOpacity: 1
          }).addTo(map).bindTooltip('Your location');
        } else {
          userLocationMarker.setLatLng(position);
        }
      },
      () => {},
      { enableHighAccuracy: true, maximumAge: 10000, timeout: 10000 }
    );
  }

  // ---- Historical tornado track (Christie Lake to Jasper, ON — July 24,
  // 2024) — a straight line between the surveyed start/end coordinates.
  const TORNADO_TRACK_PATH = [
    [44.8110, -76.4319],
    [44.8350, -75.9386]
  ];
  let tornadoPolyline = null;

  // A map screenshot (1126x588) with the actual surveyed track drawn on it
  // as a black arrow. These are the exact pixel coordinates of the arrow's
  // tail (start) and tip (end) within that image, located programmatically
  // by scanning for the darkest pixels' leftmost/rightmost extent — used to
  // scale/rotate the image so those two points land exactly on
  // TORNADO_TRACK_PATH's real-world coordinates.
  const TORNADO_IMAGE_URL = 'christie_lake_tornado_track.png';
  const TORNADO_IMAGE_SIZE = { width: 1126, height: 588 };
  const TORNADO_IMAGE_START_PX = { x: 179, y: 330 };
  const TORNADO_IMAGE_END_PX = { x: 912, y: 281 };
  const TORNADO_SURVEY_URL = 'https://ntpopendata-westernu.opendata.arcgis.com/apps/ba10a746d15f4231a1fb08591e08833a/explore';

  // Leaflet's L.imageOverlay can't rotate either, so this is a custom
  // L.Layer: an absolutely-positioned <img> whose CSS transform-origin is
  // pinned to the image's own start pixel, then rotated/scaled (recomputed
  // on every _reset(), which Leaflet calls on pan/zoom) so its end pixel
  // lands exactly on the map's projection of the real-world end coordinate.
  const TornadoImageOverlay = L.Layer.extend({
    onAdd(map) {
      const img = document.createElement('img');
      img.src = TORNADO_IMAGE_URL;
      img.style.position = 'absolute';
      img.style.width = `${TORNADO_IMAGE_SIZE.width}px`;
      img.style.height = `${TORNADO_IMAGE_SIZE.height}px`;
      img.style.cursor = 'pointer';
      img.style.transformOrigin = `${TORNADO_IMAGE_START_PX.x}px ${TORNADO_IMAGE_START_PX.y}px`;
      img.addEventListener('click', () => {
        window.open(TORNADO_SURVEY_URL, '_blank', 'noopener');
        toggleTornadoImage(); // dismiss the image and restore the line
      });
      this._img = img;
      this._map = map;
      map.getPanes().overlayPane.appendChild(img);
      map.on('viewreset zoom move', this._reset, this);
      this._reset();
    },
    onRemove(map) {
      if (this._img) {
        this._img.remove();
        this._img = null;
      }
      map.off('viewreset zoom move', this._reset, this);
    },
    _reset() {
      const map = this._map;
      const startPx = map.latLngToLayerPoint(TORNADO_TRACK_PATH[0]);
      const endPx = map.latLngToLayerPoint(TORNADO_TRACK_PATH[1]);

      const imgDx = TORNADO_IMAGE_END_PX.x - TORNADO_IMAGE_START_PX.x;
      const imgDy = TORNADO_IMAGE_END_PX.y - TORNADO_IMAGE_START_PX.y;
      const imgLen = Math.hypot(imgDx, imgDy);
      const imgAngle = Math.atan2(imgDy, imgDx);

      const mapDx = endPx.x - startPx.x;
      const mapDy = endPx.y - startPx.y;
      const mapLen = Math.hypot(mapDx, mapDy);
      const mapAngle = Math.atan2(mapDy, mapDx);

      const scale = mapLen / imgLen;
      const rotationDeg = (mapAngle - imgAngle) * 180 / Math.PI;

      this._img.style.left = `${startPx.x - TORNADO_IMAGE_START_PX.x}px`;
      this._img.style.top = `${startPx.y - TORNADO_IMAGE_START_PX.y}px`;
      this._img.style.transform = `rotate(${rotationDeg}deg) scale(${scale})`;
    }
  });

  let tornadoImageOverlay = null;
  let tornadoHitLine = null;
  let tornadoPopup = null;

  function toggleTornadoImage() {
    if (tornadoImageOverlay) {
      map.removeLayer(tornadoImageOverlay);
      tornadoImageOverlay = null;
      tornadoPolyline.addTo(map); // restore the line now that the image is gone
      tornadoHitLine.addTo(map);
      if (tornadoPopup) map.closePopup(tornadoPopup);
    } else {
      tornadoImageOverlay = new TornadoImageOverlay();
      tornadoImageOverlay.addTo(map);
      map.removeLayer(tornadoPolyline); // the image replaces the line while showing
      map.removeLayer(tornadoHitLine);
    }
  }

  function getTornadoPolyline() {
    if (!tornadoPolyline) {
      tornadoPolyline = L.polyline(TORNADO_TRACK_PATH, {
        color: '#ff4d4d', opacity: 0.9, weight: 3, interactive: false
        // interactive: false — the wider invisible line below carries all interaction
      });

      // Invisible, much wider line layered on top purely so the track is
      // easy to tap — the visible 3px line is a fine width for a mouse
      // cursor but a poor touch target on a phone.
      tornadoHitLine = L.polyline(TORNADO_TRACK_PATH, { opacity: 0, weight: 24 });

      // Triggered by click/tap rather than hover — hover doesn't exist on
      // touch devices at all, so this way the text details are reachable
      // the same way on desktop and mobile, right alongside showing the
      // image.
      tornadoHitLine.on('click', (e) => {
        tornadoPopup = L.popup({ offset: [0, -12] })
          .setLatLng(e.latlng)
          .setContent(
            '<div style="color:#1a1a1a;font:13px -apple-system,Segoe UI,Roboto,Arial,sans-serif;">' +
            'Tornado track<br>Christie Lake to Jasper, ON<br>July 24, 2024</div>'
          )
          .openOn(map);
        toggleTornadoImage();
      });
    }
    return tornadoPolyline;
  }

  function toggleTornadoTrack(visible) {
    const line = getTornadoPolyline();
    if (visible) {
      line.addTo(map);
      tornadoHitLine.addTo(map);
    } else {
      map.removeLayer(line);
      map.removeLayer(tornadoHitLine);
      if (tornadoPopup) map.closePopup(tornadoPopup);
      if (tornadoImageOverlay) {
        map.removeLayer(tornadoImageOverlay);
        tornadoImageOverlay = null;
      }
    }
  }

  // Esri's place-labels overlay (see initMap) also carries administrative/
  // municipal boundary lines — togglable as one combined layer since Esri
  // serves them as a single reference tile set, not separate products.
  let boundariesLayer = null;
  function toggleBoundariesLayer(visible) {
    if (visible) boundariesLayer.addTo(map);
    else map.removeLayer(boundariesLayer);
  }

  // ---- Rock Lake property boundary — surveyed corners, from boundary.kml.
  const PROPERTY_BOUNDARY_PATH = [
    [44.813842, -76.262328],
    [44.816955, -76.247883],
    [44.812281, -76.24197],
    [44.805723, -76.252053]
  ];
  let propertyBoundaryLayer = null;

  function togglePropertyBoundary(visible) {
    if (visible) {
      if (!propertyBoundaryLayer) {
        propertyBoundaryLayer = L.polygon(PROPERTY_BOUNDARY_PATH, {
          color: '#ff8c00', weight: 3, fillColor: '#ff8c00', fillOpacity: 0.1
        }).bindTooltip('Property Boundary');
      }
      propertyBoundaryLayer.addTo(map);
    } else if (propertyBoundaryLayer) {
      map.removeLayer(propertyBoundaryLayer);
    }
  }

  // ---- Wind: merges two sources within 50km of HOME.
  // - ECCC's official SWOB-realtime network (same MSC GeoMet OGC API as the
  //   radar/satellite/alerts), sparse near Rock Lake but calibrated.
  // - Weather Underground's crowd-sourced PWS network, much denser here
  //   (verified stations as close as 5.7km vs ECCC's ~53km), at the cost of
  //   being uncalibrated hobbyist hardware. Uses a key embedded in WU's own
  //   public web map widget — not a private/secret credential, same
  //   category as our old referrer-restricted Google Maps key.
  const WU_API_KEY = 'e1f10a1e78da46f5b10a1e78da96f525';
  const WIND_REFRESH_MS = 3 * 60 * 1000;
  const WIND_STALE_MS = 30 * 60 * 1000; // ignore a station if its last observation is older than this
  const WIND_RADIUS_KM = 50;
  let windMarkers = [];
  let windLayerVisible = false;
  let windRefreshTimerId = null;

  async function fetchNearbyWuStations() {
    const url = `https://api.weather.com/v3/location/near?geocode=${HOME.lat},${HOME.lng}&product=pws&format=json&apiKey=${WU_API_KEY}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const loc = data.location;
    const stations = loc.stationId.map((id, i) => ({
      id, name: loc.stationName[i], lat: loc.latitude[i], lng: loc.longitude[i], distanceKm: loc.distanceKm[i]
    }));
    stations.sort((a, b) => a.distanceKm - b.distanceKm);
    return stations;
  }

  async function fetchWuCurrentObservation(stationId) {
    const url = `https://api.weather.com/v2/pws/observations/current?stationId=${stationId}&format=json&units=m&apiKey=${WU_API_KEY}`;
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const data = await resp.json();
    const obs = data.observations && data.observations[0];
    if (!obs) return null;
    const metric = obs.metric || {};
    if (metric.windSpeed == null || obs.winddir == null) return null; // some PWS ticks omit wind entirely
    const obsTimeMs = new Date(obs.obsTimeUtc).getTime();
    if (Date.now() - obsTimeMs > WIND_STALE_MS) return null; // station offline/stale
    return {
      name: `${obs.neighborhood || stationId} (WU)`,
      speedKmh: metric.windSpeed,
      gustKmh: metric.windGust,
      dirDeg: obs.winddir
    };
  }

  // Every nearby WU station with valid, fresh wind data — not just the
  // closest one — fetched concurrently since each is a separate request.
  async function fetchAllValidWuWind() {
    const stations = await fetchNearbyWuStations();
    const observations = await Promise.all(stations.map(async station => {
      if (station.distanceKm > WIND_RADIUS_KM) return null;
      const obs = await fetchWuCurrentObservation(station.id);
      return obs ? { ...obs, lat: station.lat, lng: station.lng, distanceKm: station.distanceKm, source: 'WU' } : null;
    }));
    return observations.filter(Boolean);
  }

  // ECCC stations within WIND_RADIUS_KM — the bbox query only narrows
  // candidates down to a box around HOME, so real haversine distance still
  // needs checking afterward. Sorted newest-first, so the first hit per
  // station name is its latest reading.
  async function fetchNearbyEccWindStations() {
    const marginDeg = 0.6; // generous vs. WIND_RADIUS_KM=50, trimmed by the real distance check below
    const bbox = [
      HOME.lng - marginDeg, HOME.lat - marginDeg,
      HOME.lng + marginDeg, HOME.lat + marginDeg
    ].join(',');
    const url = `https://api.weather.gc.ca/collections/swob-realtime/items?bbox=${bbox}&limit=100&sortby=-date_tm-value&f=json`;
    const resp = await fetch(url);
    const data = await resp.json();

    const seen = new Set();
    const stations = [];
    for (const feature of data.features || []) {
      const p = feature.properties;
      const name = p['stn_nam-value'];
      if (!name || seen.has(name)) continue;
      const speedKmh = p['avg_wnd_spd_10m_pst10mts'] ?? p['avg_wnd_spd_10m_pst1mt'] ?? p['avg_wnd_spd_10m_pst2mts'];
      const dirDeg = p['avg_wnd_dir_10m_pst10mts'] ?? p['avg_wnd_dir_10m_pst1mt'] ?? p['avg_wnd_dir_10m_pst2mts'];
      if (speedKmh == null || dirDeg == null) continue;
      seen.add(name);

      const [lng, lat] = feature.geometry.coordinates;
      const distanceKm = haversineKm(HOME.lat, HOME.lng, lat, lng);
      if (distanceKm > WIND_RADIUS_KM) continue;
      stations.push({
        name: `${name} (ECCC)`, lat, lng, distanceKm, speedKmh, dirDeg,
        gustKmh: p['max_wnd_gst_spd_10m_pst10mts'] ?? null,
        source: 'ECCC'
      });
    }
    return stations;
  }

  async function fetchAllValidWindStations() {
    const [wuStations, eccStations] = await Promise.all([fetchAllValidWuWind(), fetchNearbyEccWindStations()]);
    return [...wuStations, ...eccStations].sort((a, b) => a.distanceKm - b.distanceKm);
  }

  function degreesToCompass(deg) {
    const dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
    return dirs[Math.round(deg / 22.5) % 16];
  }

  // A rotated arrow built from an inline SVG in a divIcon — Leaflet has no
  // built-in rotatable arrow symbol the way Google's SymbolPath did. The
  // speed number sits right below it as a permanent (non-hover) label,
  // shown directly on the marker rather than requiring a hover to see it.
  function buildWindArrowIcon(dirDeg, gustOrSpeedKmh) {
    const rotation = (dirDeg + 180) % 360; // points where the wind is blowing toward, not from
    const html = `
      <div style="position:relative; width:0; height:0;">
        <svg width="34" height="34" viewBox="-17 -17 34 34" style="position:absolute; left:-17px; top:-17px; transform: rotate(${rotation}deg);">
          <path d="M0,-11 L8,7 L0,3 L-8,7 Z" fill="#4dd0ff" fill-opacity="0.9" stroke="#ffffff" stroke-width="1"/>
        </svg>
        <div style="position:absolute; left:-20px; top:6px; width:40px; text-align:center; color:#fff; font-size:11px; font-weight:bold; text-shadow:0 0 3px rgba(0,0,0,0.8);">${Math.round(gustOrSpeedKmh)}</div>
      </div>`;
    return L.divIcon({ html, className: '', iconSize: [0, 0] });
  }

  function createWindMarker(obs) {
    // Gust is the more meaningful figure for storm impact, so it's the
    // headline number everywhere — falls back to sustained speed for
    // stations that don't report a gust at all.
    const gustOrSpeedKmh = obs.gustKmh ?? obs.speedKmh;
    const sustainedText = obs.gustKmh != null ? ` (sustained ${obs.speedKmh.toFixed(0)} km/h)` : '';
    const title = `${obs.name}: ${gustOrSpeedKmh.toFixed(0)} km/h gust from ${degreesToCompass(obs.dirDeg)}${sustainedText}`;

    return L.marker([obs.lat, obs.lng], {
      icon: buildWindArrowIcon(obs.dirDeg, gustOrSpeedKmh),
      zIndexOffset: 1000
    }).bindTooltip(title);
  }

  async function refreshWindDisplay() {
    if (!windLayerVisible) return;
    try {
      const validStations = await fetchAllValidWindStations();
      if (!windLayerVisible) return; // toggled off while the fetch was in flight

      windMarkers.forEach(m => map.removeLayer(m));
      windMarkers = validStations.map(obs => createWindMarker(obs).addTo(map));
    } catch (e) { /* leave whatever markers are currently shown on a transient fetch failure */ }
  }

  function toggleWindLayer(visible) {
    windLayerVisible = visible;
    clearInterval(windRefreshTimerId);
    if (visible) {
      refreshWindDisplay();
      windRefreshTimerId = setInterval(refreshWindDisplay, WIND_REFRESH_MS);
    } else {
      windMarkers.forEach(m => map.removeLayer(m));
      windMarkers = [];
    }
  }

  // ---- Severe weather alerts (ECCC, via MSC GeoMet's OGC API Features —
  // same public infrastructure as the radar/satellite WMS layers, a
  // different collection: weather-alerts). The bbox query only narrows
  // candidates down to what's near HOME; whether HOME is actually inside a
  // given alert's zone still needs a real point-in-polygon test against its
  // geometry, since a warning zone can be much larger than the search box
  // and only partially overlap it.
  const ALERT_REFRESH_MS = 2 * 60 * 1000;
  const ALERT_SEARCH_MARGIN_DEG = 0.5;
  const ALERT_RISK_COLORS = { red: '#e63946', orange: '#ff8c3c', yellow: '#ffd83c' };

  // ---- Environment Canada forecast — weather.json is committed hourly by a
  // GitHub Actions workflow (fetch_weather.py), rather than being fetched
  // live from EC's API in the browser: that API doesn't reliably send CORS
  // headers, so a direct fetch() from a static page can't be counted on.
  // Refreshing this on a short client-side interval just picks up whatever
  // the last successful workflow run committed, in case the page is left
  // open across an hourly update.
  const WEATHER_REFRESH_MS = 15 * 60 * 1000;
  const WEATHER_STALE_MS = 6 * 60 * 60 * 1000; // workflow runs hourly; this generous a gap means it's actually broken

  // Persists across renders (both the WEATHER_REFRESH_MS re-fetch and the
  // collapse/expand toggle) so neither one stomps on the other. Starts
  // expanded per the default requested; collapsing shrinks the whole widget
  // down to a small icon-only button — mainly for mobile, where the
  // expanded card (especially the hourly table) can be wider than the
  // screen, and there needs to be a way to get it out of the way entirely.
  let weatherExpanded = true;

  // Maps EC's free-text condition strings to a standard weather emoji.
  // Only the first clause is considered — daily text_summary is a multi-
  // sentence forecast ("Sunny. Fog patches dissipating this morning...")
  // where only the headline clause describes the day's dominant condition;
  // matching the whole string would let an incidental later mention (like
  // "fog") win over the actual headline.
  function weatherIconFor(condition) {
    const t = (condition || '').toLowerCase().split('.')[0];
    if (/thunderstorm/.test(t)) return '⛈️'; // ⛈️
    if (/freezing rain|ice pellet|hail/.test(t)) return '\u{1F9CA}'; // 🧊
    if (/flurr|snow/.test(t)) return '\u{1F328}️'; // 🌨️
    if (/rain|shower|drizzle/.test(t)) return '\u{1F327}️'; // 🌧️
    if (/fog|mist|haze|smoke/.test(t)) return '\u{1F32B}️'; // 🌫️
    if (/windy/.test(t)) return '\u{1F4A8}'; // 💨
    if (/mix of sun and cloud|partly cloudy|mostly cloudy/.test(t)) return '⛅'; // ⛅
    if (/cloudy|overcast/.test(t)) return '☁️'; // ☁️
    if (/clear/.test(t)) return '\u{1F319}'; // 🌙 (EC uses "Clear" for night, "Sunny" for day)
    if (/sunny/.test(t)) return '☀️'; // ☀️
    return '';
  }

  // formatElapsedSince (used for lightning strikes, always under an hour)
  // renders bare "mm:ss" — ambiguous once the elapsed time can run to hours,
  // as it routinely does here since the forecast only refreshes hourly.
  function formatWeatherAge(timestampMs) {
    const totalMinutes = Math.max(0, Math.floor((Date.now() - timestampMs) / 60000));
    if (totalMinutes < 60) return `${totalMinutes} min ago`;
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    return `${hours}h ${minutes}m ago`;
  }

  function renderWeatherWidget(data) {
    const el = document.getElementById('weatherWidget');
    const cur = data.current || {};

    if (!weatherExpanded) {
      el.className = 'collapsed';
      el.innerHTML = `<button id="weatherCollapsedBtn" title="Show forecast">${weatherIconFor(cur.condition) || '\u{1F321}️'}</button>`;
      document.getElementById('weatherCollapsedBtn').addEventListener('click', () => {
        weatherExpanded = true;
        renderWeatherWidget(data);
      });
      return;
    }

    const daily = (data.daily || []).slice(0, 4);
    // Each daily period's precip_mm (fetch_weather.py) is a sum of 12
    // hourly RDPS values over an assumed 6am-6pm/6pm-6am local window, not
    // an exact match to whatever day/night boundary EC's own forecasters
    // used — and it's null beyond RDPS's ~84h horizon (in practice, always
    // present for the 4 periods actually shown here).
    //
    // EC only gives an hourly breakdown for roughly the next 24h, not per
    // day for the whole forecast above — so it's one rolling table, not
    // something attached to an individual daily row. Laid out as a table
    // transposed (hours as columns) rather than one row per hour, so it
    // reads like a normal hourly-forecast strip. The widget's own
    // overflow-x:auto (see #weatherWidget.expanded in CSS) keeps this
    // contained and scrollable in place on a screen too narrow to show
    // every column at once, rather than pushing the widget — or the page —
    // past the screen edge.
    //
    // Hour labels are pinned to Rock Lake's own timezone (America/Toronto)
    // rather than left to default to the viewing device's timezone — this
    // is a forecast for one fixed place, not wherever the viewer happens to
    // be, so showing it in the viewer's local time would be misleading (and
    // silently wrong if that device's clock/timezone is simply misconfigured).
    //
    // precip_mm (the "Amount" row) comes from a second, independent source
    // (MSC GeoMet's RDPS model output, fetched in fetch_weather.py) rather
    // than EC's own citypage feed above — that feed only has a probability
    // %, never an actual amount. The two can legitimately disagree (e.g. a
    // nonzero % alongside a 0mm amount) since they're different products,
    // not a bug.
    const hourly = data.hourly || [];
    el.className = 'expanded';
    el.innerHTML = `
      <div id="weatherNow" title="Click to collapse">
        <span id="weatherCollapseHint">&#9650;</span>
        <span id="weatherTemp">${Math.round(cur.temperature)}&deg;</span>
        <span id="weatherCondition">${weatherIconFor(cur.condition)} ${cur.condition || ''}</span>
      </div>
      <div id="weatherHiLo">High ${Math.round(cur.high_temp)}&deg; &middot; Low ${Math.round(cur.low_temp)}&deg;</div>
      <div id="weatherDaily">${daily.map(d => `
        <div class="weatherDailyRow">
          <span>${weatherIconFor(d.text_summary)} ${d.period}</span>
          <span>${Math.round(d.temperature)}&deg;${d.precip_probability ? ` &middot; ${d.precip_probability}%` : ''}${d.precip_mm ? ` &middot; ${d.precip_mm}mm` : ''}</span>
        </div>
      `).join('')}</div>
      ${hourly.length ? `
      <div id="weatherHourly">
        <table id="weatherHourlyTable">
          <tr><th>Time</th>${hourly.map(h => `<td>${new Date(h.period).toLocaleTimeString([], { hour: 'numeric', timeZone: 'America/Toronto' })}</td>`).join('')}</tr>
          <tr><th>&nbsp;</th>${hourly.map(h => `<td class="weatherHourlyIcon">${weatherIconFor(h.condition)}</td>`).join('')}</tr>
          <tr><th>Temp</th>${hourly.map(h => `<td>${Math.round(h.temperature)}&deg;</td>`).join('')}</tr>
          <tr><th>Precip</th>${hourly.map(h => `<td>${h.precip_probability ? `${h.precip_probability}%` : '&mdash;'}</td>`).join('')}</tr>
          <tr><th>Amount</th>${hourly.map(h => `<td>${h.precip_mm ? `${h.precip_mm}mm` : '&mdash;'}</td>`).join('')}</tr>
        </table>
      </div>` : ''}
      <div id="weatherUpdated">${data.location || 'Rock Lake'} &middot; updated ${formatWeatherAge(new Date(data.generated_at).getTime())}</div>
    `;
    document.getElementById('weatherNow').addEventListener('click', () => {
      weatherExpanded = false;
      renderWeatherWidget(data);
    });
  }

  async function refreshWeather() {
    const el = document.getElementById('weatherWidget');
    let data;
    try {
      const resp = await fetch('weather.json', { cache: 'no-store' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
    } catch (e) {
      return; // leave whatever's currently displayed on a transient fetch failure
    }

    const ageMs = Date.now() - new Date(data.generated_at).getTime();
    if (ageMs > WEATHER_STALE_MS) {
      el.classList.add('hidden');
      return;
    }

    el.classList.remove('hidden');
    renderWeatherWidget(data);
  }

  function isPointInRing(lat, lng, ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const [xi, yi] = ring[i];
      const [xj, yj] = ring[j];
      const crosses = ((yi > lat) !== (yj > lat)) &&
        (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi);
      if (crosses) inside = !inside;
    }
    return inside;
  }

  // GeoJSON Polygon coordinates are [outerRing, hole1, hole2, ...]; a point
  // counts as inside only if it's in the outer ring and not in any hole.
  function isPointInGeometry(lat, lng, geometry) {
    if (!geometry) return false;
    if (geometry.type === 'Polygon') {
      const [outer, ...holes] = geometry.coordinates;
      if (!isPointInRing(lat, lng, outer)) return false;
      return !holes.some(hole => isPointInRing(lat, lng, hole));
    }
    if (geometry.type === 'MultiPolygon') {
      return geometry.coordinates.some(poly => isPointInGeometry(lat, lng, { type: 'Polygon', coordinates: poly }));
    }
    return false;
  }

  async function fetchActiveAlertsAtHome() {
    const bbox = [
      HOME.lng - ALERT_SEARCH_MARGIN_DEG, HOME.lat - ALERT_SEARCH_MARGIN_DEG,
      HOME.lng + ALERT_SEARCH_MARGIN_DEG, HOME.lat + ALERT_SEARCH_MARGIN_DEG
    ].join(',');
    const url = `https://api.weather.gc.ca/collections/weather-alerts/items?bbox=${bbox}&limit=100&f=json`;
    const resp = await fetch(url);
    const data = await resp.json();

    const now = Date.now();
    const active = [];
    for (const feature of data.features || []) {
      const p = feature.properties;
      if (p.status_en === 'ended') continue; // forecasters can cancel an alert before its nominal expiry
      if (new Date(p.expiration_datetime).getTime() <= now) continue;
      if (!isPointInGeometry(HOME.lat, HOME.lng, feature.geometry)) continue;

      active.push({
        name: p.alert_short_name_en,
        color: ALERT_RISK_COLORS[p.risk_colour_en] || '#999999',
        text: p.alert_text_en || p.alert_text_fr || '',
        areaName: p.feature_name_en,
        expirationMs: new Date(p.expiration_datetime).getTime(),
        geoJson: feature.geometry
      });
    }
    return active;
  }

  let alertLayers = [];

  function updateAlertBanner(active) {
    const el = document.getElementById('alertBanner');
    if (active.length === 0) {
      el.classList.add('hidden');
      el.innerHTML = '';
      return;
    }
    el.classList.remove('hidden');
    el.innerHTML = active.map(a => {
      const until = new Date(a.expirationMs).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      return `<details>
        <summary style="color:${a.color}">${a.name} — ${a.areaName}, until ${until}</summary>
        <div class="alertText">${a.text.replace(/\n/g, '<br>')}</div>
      </details>`;
    }).join('');
  }

  async function refreshAlerts() {
    let active;
    try {
      active = await fetchActiveAlertsAtHome();
    } catch (e) {
      return; // leave whatever's currently displayed on a transient fetch failure
    }

    alertLayers.forEach(layer => map.removeLayer(layer));
    // L.geoJSON understands Polygon/MultiPolygon (including holes) directly
